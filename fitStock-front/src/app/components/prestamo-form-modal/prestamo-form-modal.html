<!-- Modal para crear un nuevo préstamo -->
<div class="modal-overlay" (click)="cerrarModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- Cabecera del modal -->
    <div class="modal-header">
      <h2>Nuevo Préstamo</h2>
      <button class="btn-close" (click)="cerrarModal()">✕</button>
    </div>
    <!-- Formulario con datos del préstamo -->
    <form class="modal-form">
      <div class="form-group">
        <label>Producto</label>
        <select [(ngModel)]="prestamo.productoId" name="productoId" required>
          <option value="">Seleccionar producto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nombre del usuario</label>
        <input type="text" [(ngModel)]="prestamo.usuarioNombre" name="usuarioNombre" placeholder="Nombre completo" required>
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" [(ngModel)]="prestamo.usuarioTelefono" name="usuarioTelefono" placeholder="612345678" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" [(ngModel)]="prestamo.cantidad" name="cantidad" min="1" required>
        </div>
        <div class="form-group">
          <label>Días de préstamo</label>
          <input type="number" [(ngModel)]="prestamo.diasPrestamo" name="diasPrestamo" min="1" required>
        </div>
      </div>
      <div class="form-group">
        <label>Observaciones</label>
        <textarea [(ngModel)]="prestamo.observaciones" name="observaciones" rows="3" placeholder="Notas adicionales..."></textarea>
      </div>
      <!-- Botones de acción del formulario -->
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar Préstamo</button>
      </div>
    </form>
  </div>
</div>
